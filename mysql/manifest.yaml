name: mysql
display_name: MySQL
description: Integration providing import and export capabilities for MySQL databases.
api_version: v1.1.0
homepage: https://github.com/PlakarKorp/integration-mysql
license: ISC
tier: official
contact: mailto:help@plakar.io
connectors:
  - type: importer
    executable: mysqlImporter
    homepage: https://github.com/PlakarKorp/integration-mysql
    license: ISC
    protocols: [mysql]
    validator: ./importer/schema.json
    class: database
  - type: exporter
    executable: mysqlExporter
    homepage: https://github.com/PlakarKorp/integration-mysql
    license: ISC
    protocols: [mysql]
    validator: ./exporter/schema.json
    class: database
