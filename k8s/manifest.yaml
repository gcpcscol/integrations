name: k8s
display_name: k8s
description: backup and restore kubernetes resources
homepage: https://github.com/PlakarKorp/integration-k8s
license: ISC
api_version: v1.1.0
connectors:
- type: importer
  executable: k8s-importer
  protocols: [k8s, k8s+csi, k8s+pvc]
  validator: ./importer/schema.json
- type: exporter
  executable: k8s-exporter
  protocols: [k8s, k8s+csi]
  validator: ./exporter/schema.json
