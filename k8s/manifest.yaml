name: k8s
display_name: Kubernetes
description: backup and restore kubernetes resources & PVC data
homepage: https://github.com/PlakarKorp/integration-k8s
license: ISC
api_version: v1.1.0
connectors:
- type: importer
  executable: k8s-importer
  protocols: [k8s]
  validator: ./importer/k8s.json
- type: importer
  executable: k8s-importer
  protocols: [k8s+csi]
  validator: ./importer/k8s+csi.json
- type: importer
  executable: k8s-importer
  protocols: [k8s+pvc]
  validator: ./importer/k8s+pvc.json
- type: exporter
  executable: k8s-exporter
  protocols: [k8s]
  validator: ./exporter/k8s.json
- type: exporter
  executable: k8s-exporter
  protocols: [k8s+csi]
  validator: ./exporter/k8s+pvc.json
