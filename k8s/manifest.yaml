name: k8s
display_name: Kubernetes
description: backup and restore kubernetes resources & PVC data
homepage: https://github.com/PlakarKorp/integrations/tree/main/k8s
license: ISC
api_version: v1.1.0
connectors:
- type: importer
  executable: k8s-importer
  protocols: [k8s]
  validator: ./plugin/importer/k8s.json
- type: importer
  executable: k8s-importer
  protocols: [k8s+csi]
  validator: ./plugin/importer/k8s+csi.json
  class: block-storage
  subclass: pvc
- type: importer
  executable: k8s-importer
  protocols: [k8s+pvc]
  validator: ./plugin/importer/k8s+pvc.json
  class: block-storage
  subclass: pvc
- type: exporter
  executable: k8s-exporter
  protocols: [k8s]
  validator: ./plugin/exporter/k8s.json
- type: exporter
  executable: k8s-exporter
  protocols: [k8s+pvc]
  validator: ./plugin/exporter/k8s+pvc.json
  class: block-storage
  subclass: pvc
