name: scaleway-instance
display_name: Scaleway Instance
description: Integration providing storage, import and export capabilities to and from/to instances hosted on Scaleway
api_version: v1.1.0
tier: official
homepage: https://github.com/PlakarKorp/integration-scaleway-instance
license: ISC
contact: mailto:help@plakar.io
connectors:
- type: importer
  executable: scalewayInstanceImporter
  protocols: [scaleway+instance]
  validator: ./importer/schema.json
  class: compute
